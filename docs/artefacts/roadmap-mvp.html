<!--
	roadmap-artefact.html: template consumed by `roadmap.py render`.
	Two placeholders, each substituted exactly once below: the phase-name
	title (in the head and heading) and the JSON data blob
	(phase, generated, stats, ready, mermaid, validation), which lands in the
	roadmap-data script element near the foot of the document. Render does a
	global string replace, so the data-blob token must appear verbatim exactly
	once in this file (the render step asserts this); a second copy here would
	inject the blob into this comment and the mermaid edge arrows would close
	the comment early and spill the JSON onto the page. For the same reason
	this comment must not contain a raw comment-close sequence.
	Everything else is static so regenerated artefacts diff cleanly.

	--color-primary-bg:      var(--color-pink-1);
	--color-primary-text:    var(--color-pink-6);
	/* Status semantics: green finished, gray blank, red stop, purple parked,

	--color-done-bg:         var(--color-green-1);

}

		--color-primary:         var(--color-pink-2);
		--color-primary-bg:      var(--color-pink-6);

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
	font-family: "IBM Plex Sans", system-ui, sans-serif;
	background:
		linear-gradient(var(--grid-line) 1px, transparent 1px),
		linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
		var(--bg);
	background-size: 32px 32px, 32px 32px, auto;
	color: var(--text);
	line-height: 1.55;
}
.layout { display: flex; max-width: 1200px; margin: 0 auto; gap: 2rem; padding: 0 1.25rem; }
nav {
	position: sticky; top: 0; align-self: flex-start;
	width: 180px; flex-shrink: 0; padding: 2rem 0;
	font-family: "IBM Plex Mono", monospace; font-size: 0.8rem;
}
nav a { display: block; padding: 0.35rem 0.6rem; color: var(--muted); text-decoration: none; border-left: 2px solid var(--line); }
nav a:hover, nav a.active { color: var(--color-milestone); border-left-color: var(--color-milestone); }
main { flex: 1; min-width: 0; padding: 2rem 0 4rem; }

header.page h1 { font-size: 1.6rem; font-weight: 600; margin: 0 0 0.2rem; }
header.page .meta { font-family: "IBM Plex Mono", monospace; font-size: 0.75rem; color: var(--muted); }

section { margin-top: 2.5rem; }
h2 {
	font-family: "IBM Plex Mono", monospace; font-size: 0.85rem; font-weight: 500;
	text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
	display: flex; align-items: center; gap: 0.5rem; margin: 0 0 1rem;
}
h2 .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--color-milestone); flex-shrink: 0; }

.card { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 1.1rem 1.3rem; min-width: 0; }
.card--hero { background: var(--color-milestone-bg); border-color: var(--color-milestone); }
.card--hero .kpi { font-size: 2.1rem; font-weight: 600; color: var(--color-milestone-text); }
.card--hero .kpi small { font-size: 1rem; font-weight: 400; color: var(--color-milestone); margin-left: 0.5rem; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.9rem; margin-top: 0.9rem; }
.grid > * { min-width: 0; }
.mini h3 { margin: 0 0 0.3rem; font-size: 0.9rem; font-weight: 600; overflow-wrap: break-word; }
.mini .count { font-family: "IBM Plex Mono", monospace; font-size: 0.75rem; color: var(--muted); }
.progress-bar { height: 6px; background: var(--line); border-radius: 3px; margin-top: 0.55rem; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; }

details.milestone { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 0.8rem; }
details.milestone > summary {
	cursor: pointer; padding: 0.85rem 1.2rem; font-weight: 600;
	display: flex; align-items: center; gap: 0.7rem; list-style: none; min-width: 0;
}
details.milestone > summary::-webkit-details-marker { display: none; }
details.milestone > summary .mid {
	font-family: "IBM Plex Mono", monospace; font-size: 0.72rem;
	background: var(--color-milestone-bg); color: var(--color-milestone-text);
	border: 1px solid var(--color-milestone); border-radius: 4px; padding: 0.1rem 0.4rem;
}
details.milestone > summary .count { margin-left: auto; font-family: "IBM Plex Mono", monospace; font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
details.milestone .body { padding: 0 1.2rem 1rem; }
.group h4 { font-family: "IBM Plex Mono", monospace; font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin: 0.9rem 0 0.35rem; }
.group ul { list-style: none; margin: 0; padding: 0; }
.group li { position: relative; padding: 0.28rem 0 0.28rem 1.15rem; overflow-wrap: break-word; min-width: 0; }
.group li::before { content: ""; position: absolute; left: 0; top: 0.72rem; width: 8px; height: 8px; border-radius: 50%; background: var(--g-colour, var(--muted)); }
.tid {
	font-family: "IBM Plex Mono", monospace; font-size: 0.72rem;
	background: var(--color-primary-bg); color: var(--color-primary-text);
	border: 1px solid var(--color-primary); border-radius: 4px; padding: 0.05rem 0.35rem; margin-right: 0.45rem;
}
.depnote { color: var(--muted); font-size: 0.82rem; }
li.oos { text-decoration: line-through; color: var(--muted); }

.diagram-shell { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; position: relative; overflow: hidden; }
.diagram-toolbar { position: absolute; top: 0.5rem; right: 0.5rem; z-index: 2; display: flex; gap: 0.25rem; }
.diagram-toolbar button {
	font-family: "IBM Plex Mono", monospace; font-size: 0.8rem; line-height: 1;
	background: var(--bg); color: var(--text); border: 1px solid var(--line);
	border-radius: 4px; padding: 0.3rem 0.5rem; cursor: pointer;

.diagram-toolbar button:hover { border-color: var(--color-milestone); color: var(--color-milestone); }
.mermaid-wrap { overflow: hidden; cursor: grab; min-height: 320px; }
.mermaid-wrap:active { cursor: grabbing; }
.mermaid-wrap svg { display: block; transform-origin: 0 0; max-width: none !important; }
.diagram-shell.expanded { position: fixed; inset: 1.5rem; z-index: 10; box-shadow: 0 4px 40px rgba(0,0,0,0.35); }
.diagram-shell.expanded .mermaid-wrap { height: calc(100% - 0px); }

.legend {
	display: flex; flex-wrap: wrap; gap: 0.35rem 1.1rem; align-items: center;
	margin-top: 0.6rem; font-size: 0.78rem; color: var(--muted);
	font-family: "IBM Plex Mono", monospace;
}
.legend .key { display: inline-flex; align-items: center; gap: 0.4rem; }
.legend .sw { width: 0.9rem; height: 0.9rem; border-radius: 3px; border: 1.5px solid; box-sizing: border-box; }
.legend .key--mile { font-weight: 600; }
.legend .key--gate { font-style: italic; }
.legend .keynote { flex-basis: 100%; }

.nextup li { display: block; }
.pill {
	font-family: "IBM Plex Mono", monospace; font-size: 0.68rem;

.signal { color: var(--muted); font-size: 0.78rem; font-family: "IBM Plex Mono", monospace; margin-left: 0.4rem; }

.validation { border-left: 3px solid var(--color-blocked); background: var(--color-blocked-bg); color: var(--text); padding: 0.7rem 1rem; border-radius: 0 6px 6px 0; margin-top: 1rem; font-size: 0.85rem; }

@media (max-width: 760px) {
	.layout { flex-direction: column; gap: 0; }
	nav { position: sticky; top: 0; width: auto; display: flex; overflow-x: auto; gap: 0.25rem; padding: 0.6rem 0; background: var(--bg); z-index: 5; }
	nav a { border-left: none; border-bottom: 2px solid var(--line); white-space: nowrap; }
	nav a:hover, nav a.active { border-bottom-color: var(--color-milestone); }
}
</style>

ion committed in artefact.ts; parameters deliberately scoped per primitive, no shared unions — `crossSection` and `taper` carry different value-sets across primitives; `PRIMITIVE_TYPES` array + `isPrimitiveType` guard round out the union-values-guard trio per the visibility.ts precedent; material-tag compatibility stays with 2GN.10, dimension derivation with 2GN.8, selection weights with 2GN.2/2GN.4 — this module is data only, no `MaterialTag` import needed; covered by 7 Deno tests asserting the eight-primitive vocabulary, per-primitive parameter names and verbatim spot-checked value lists)", "status": "done", "dependsOn": ["1FD.10", "M1"], "milestone": "M2", "notes": "", "assignee": ""}, {"id": "2GN.2", "description": "`src/lib/data/grammars/core.ts` — MVP component grammar rules: `\u003cobject\u003e` → `\u003ccomponent-group\u003e+`, `\u003ccomponent-group\u003e` → `\u003cprimary-component\u003e` + optional attachments, base weights (four `GrammarRule`s in BNF order exported as a `readonly GrammarRule[]` — interfaces-first against the 1FD.10 types, no keyed index since `symbol` is already the rule's identity; `attachment` authored as a fourth rule so `selectGrammarOption` (2GN.4) applies culture-biased weighted selection uniformly to join choice, with the caveat documented in the module header that its options expand to `AttachmentType` terminals — neither rule symbols nor primitives — consumed positionally by `expandGrammar` (2GN.3) as edge labels, never expanded as components; the BNF's `+`/`*` repetition is deliberately not encoded — chain length is engine behaviour (2GN.3) bounded by accumulation constraints (2GN.6/2GN.7); all `baseWeight`s and `culturalModifiers` are authored MVP-provisional archaeology-flavoured priors since doc 05 §5.4 gives the modifier maths but no numbers, to tune once generation is observable in the Explorer; five illustrative `phaseModifiers` entries — hollow-enclosed on `technology.ceramics`, bar-form/socketed/riveted/threaded on `technology.metallurgy` — as fixtures for `phaseInfluence`, multiplier semantics firming up at 2GN.5; covered by 8 Deno tests asserting the four-rule vocabulary, exact primitive and attachment coverage in registry/union order, `expandsTo` resolution, positive finite weights and valid modifier keys — no assertions on specific weight values, so tests don't fossilise provisional numbers)", "status": "done", "dependsOn": ["1FD.10", "M1"], "milestone": "M2", "notes": "", "assignee": ""}, {"id": "2GN.3", "description": "`engine/generation/grammar.ts` — `expandGrammar(rules, culture, phase, prng)`: top-level grammar expansion, selects primary component, expands attachment chains (walks the §5.3 BNF top-down into an `ExpandedObject` — tree shapes `ComponentNode`/`AttachmentBranch`/`ComponentGroupNode`/`ExpandedObject` added to `types/grammar.ts`, deliberately carrying no ids, dimensions or portability since those are the 2GN.8 flatten's concerns, keeping the tree a cheap re-rollable intermediate for §6.2 re-expansion (2GN.16); `primitiveType` stays a plain `string` per the `NormalisedComponent` precedent — `types/` never imports `data/`; `ATTACHMENT_TYPE_VALUES` + `isAttachmentType` complete the union-values-guard trio per the visibility.ts precedent so the engine validates join terminals at runtime; primitive terminals roll their physical parameters at expansion time, uniform per parameter in registry order, so normalisation never touches the PRNG; the attachment rule's options are consumed positionally as edge labels per the 2GN.2 contract, with non-attachment terminals throwing; every selection routes through `selectGrammarOption` including the single-option `object`/`component-group` rules — the prng draw sequence is the determinism contract, so future multi-option rules change distributions, not draw structure; repetition is bounded by provisional constants pending 2GN.6/2GN.7 — tier-specific continuation probabilities of 0.2/0.4/0.6 with group caps of 2/3/4 echoing §5.5's tier ceilings, attachment slots at 0.4 × 0.5^depth with breadth 2 and depth 3; malformed grammar (missing rules, unknown symbols, rule cycles via a hop budget) throws loudly; the `expandsTo` resolution order — rule symbol → primitive → attachment terminal → throw — is now the firmed contract in its JSDoc; covered by 10 Deno tests: same-seed deep-equal trees, seed divergence, structural validity over 200 seeds, cap enforcement over 500, repetition distribution ~70% single-group over 1 000, three malformed-grammar throw cases and an end-to-end culture-bias sweep)", "status": "done", "dependsOn": ["2GN.2"], "milestone": "M2", "notes": "", "assignee": ""}, {"id": "2GN.4", "description": "`engine/generation/grammar.ts` — `selectGrammarOption(rule, culture, phase, prng)`: culture-biased weighted selection with 0.01 floor (doc 05 §5.4's formula adapted to the callback-shaped `weightedSelect` from 1FD.7 — effective weights computed transiently in the `getWeight` callback via a private `effectiveOptionWeight` helper, never stored: `baseWeight` + affinity × modifier per cultural entry with missing affinities reading as 0, scaled by `phaseInfluence` (2GN.5), floored at 0.01, which also makes `weightedSelect`'s zero-total uniform fallback unreachable from this call site; exactly one prng draw per call regardless of option count, so draw ordering is a stable determinism contract for `expandGrammar` (2GN.3); `culture` param typed `CulturalProfile` not `Culture` — the pipeline passes `baseProfile`; covered by 6 Deno tests — determinism, culture and phase distribution shifts over 1 000 draws, floor reachability at the ~0.1% expected rate over 10 000 draws, inert modifiers for absent affinities, single-draw consumption via a call-counting prng wrapper — all against crafted rules so core.ts's provisional weights aren't fossilised, per the 2GN.2 precedent)", "status": "done", "dependsOn": ["2GN.3"], "milestone": "M2", "notes": "", "assignee": ""}, {"id": "2GN.5", "description": "`engine/generation/grammar.ts` — `phaseInfluence(option, phase)`: phase characteristics modify grammar option weights (the provisional `phaseModifiers` contract firmed here as promised at 1FD.10/2GN.2: each `[dottedPath, multiplier]` entry resolves its 0–1 attribute from `PhaseCharacteristics` and contributes the factor `1 + (multiplier − 1) × attribute` — neutral at attribute 0, the full multiplier at 1, sub-1 multipliers suppressing in proportion to the attribute — so low technology never suppresses below base weight, matching doc 05 §3.2's framing that high attributes *increase* probabilities; entries combine by product; absent/empty maps return a neutral 1; unresolvable paths throw, since grammar data is authored in-repo and core.test.ts guards the shipped keys — a miss is always an authoring typo, better loud than silently skewing distributions forever; path resolution is a generic object walk so new `PhaseCharacteristics` attributes need no engine change; `types/grammar.ts` JSDoc updated from \"expect this to firm up\" to the fixed contract; `tests/fixtures/culture.ts` gained exported `mockPhaseCharacteristics` (two-level merge overrides — a documented divergence from `mockCulture`'s whole-branch replacement, since all four branches are flat numeric records) and `mockCulturalProfile` builders; covered by 7 Deno tests — lerp endpoints and midpoint, product combination, sub-1 suppression, both throw cases and a shipped-fixture sweep asserting every core.ts modifier evaluates finite and positive)", "status": "done", "dependsOn": ["2GN.3"], "milestone": "M2", "notes": "", "assignee": ""}, {"id": "2GN.7", "description": "`engine/generation/grammar.ts` — complexity budget derivation from `craftSpecialisation` (simple/moderate/sophisticated thresholds) (exported `resolveComplexityTier` + `deriveComplexityBudget(craftSpecialisation)`, scalar signatures since doc 05 §5.5 derives from exactly one attribute — input-honest and fixture-free to test; `ComplexityTier` stays engine-local since `types/grammar.ts` is data shapes only and the tier is a derivation detail; the doc's overlapping tier bounds firmed as half-open upward — simple [0, 0.3), moderate [0.3, 0.6), sophisticated [0.6, 1] — so boundary values promote: more specialisation never means less complexity; non-finite or out-of-[0,1] input throws per the `resolvePhaseAttribute` loud-failure precedent; derivation is pure and PRNG-free so it can never perturb the draw-sequence determinism contract; `expandGrammar` now consumes `maxDistinctGroups` (2/3/4) as its group-repetition cap and enforces a per-tier `minDistinctGroups` (1/2/3) unconditionally before a per-tier `additionalGroupProbability` (provisional 0.2/0.4/0.6) governs further additions up to the cap — the minimum is kept engine-side in the tier table rather than on `AccumulationConstraints` so that type stays spec-verbatim, but it is enforced as a hard floor, giving the doc's tier group ranges (\"1–2/2–3/3–4\") exactly rather than as a distribution shift; `maxComponentsPerGroup` (4/8/12, rising to cover radial's doc maximum only at sophisticated) and `noTwoGroupsSameType` (true only at simple) are authored MVP-provisional per the 2GN.2 precedent — derived now, enforced at 2GN.6; pattern instances carry §5.5's example counts verbatim as authored data and are built fresh per call so no two budgets share mutable innards; attachment depth/breadth constants stay provisional pending 2GN.6; covered by 6 new Deno tests — tier boundaries, throw cases, doc-cited group caps, pattern-set widening per tier with a spot-check on symmetric's [2, 4, 6], monotone provisional limits, mutation safety — plus the 2GN.3 cap and distribution tests reworked tier-aware: group counts asserted within the enforced 1–2/2–3/3–4 ranges over 500 seeds per tier, and the distribution test now pins ordering (more specialisation → more groups) instead of the provisional probabilities)", "status": "done", "dependsOn": ["2GN.3"], "milestone": "M2", "notes": "", "assignee": ""}, {"id": "2GN.6", "description": "`engine/generation/grammar.ts` — accumulation checking: `ArrangementPattern` constraint enforcement (symmetric, radial, linear-array, stacked, nested, branching valid counts) (exported `checkAccumulation(object, constraints): AccumulationCheckResult` — a pure validator, not expansion-time enforcement, since doc 05 §6.2's model is check-and-re-roll with the re-expansion loop owned by 2GN.16; the result shape `{ valid, failures }` mirrors the planned `checkPlausibility` (2GN.12) so the loop can treat both uniformly, with `AccumulationCheckResult` engine-local per the `ComplexityTier` precedent; the doc gives no detection mechanism for arrangement groups on the raw tree — `arrangementGroup` only exists on `NormalisedComponent` at 2GN.8 — so the detection boundary firmed here (user-confirmed design decision) is per top-level group: same-`primitiveType` components within one top-level `ComponentGroupNode` (primary plus attachment descendants, recursively) form one arrangement group, never pooling across top-level groups, keeping `noTwoGroupsSameType` meaningful and setting the boundary 2GN.8's `arrangementGroup` annotation must follow; four checks — top-level group count vs `maxDistinctGroups` (defensive re-check, since `expandGrammar` already enforces it, keeping the validator authoritative over hand-built/deserialised trees), per-arrangement count vs `maxComponentsPerGroup`, pattern admissibility for every repetition (count ≥ 2) with `symmetric` as an exact-count allow-list and the other five as inclusive ranges per the 1FD.10 type asymmetry, and `noTwoGroupsSameType` triggering only when two top-level groups each carry an arrangement of the same type — same-type singles never trigger it, a single component being no arrangement at all; pure and PRNG-free, failure messages name type, count and violated bound; a failed check is not an error — expansion is cheap, the pipeline re-rolls; `expandGrammar`'s provisional attachment constants stay as generation-side heuristics with the checker now the validation authority, per the updated module comments; covered by 12 Deno tests against crafted trees and constraints so provisional tier numbers aren't fossilised — clean pass, symmetric allow-list vs range inclusivity at both bounds, cap-beats-pattern precedence, the never-pools-across-groups boundary, nested-descendant counting, both `noTwoGroupsSameType` polarities plus the singles exemption, defensive group-count failure, simultaneous-violation accumulation, purity/no-mutation via `structuredClone` snapshots, and a 500-seed moderate-tier integration sweep asserting expanded trees mostly satisfy their own derived budget)", "status": "done", "dependsOn": ["2GN.7", "2GN.3"], "milestone": "M2", "notes": "", "assignee": ""}, {"id": "3WS.1", "description": "`engine/world/seed.ts` — `createWorldSeed(raw: string): WorldSeed` — seed string → PRNG", "status": "blocked", "dependsOn": ["2GN.56", "M2"], "milestone": "M3", "notes": "", "assignee": ""}, {"id": "3WS.2", "description": "`engine/world/chronology.ts` — `generateChronology(seed, prng): WorldChronology` — startYear, endYear, presentYear, culture-relative periodisation (no shared timeline)", "status": "blocked", "dependsOn": ["3WS.1"], "milestone": "M3", "notes": "", "assignee": ""}, {"id": "3WS.3", "description": "`engine/world/culture.ts` — `generateCultures(prng, count): Culture[]` — culture generation with `CulturalProfile` (materialAffinities, motifVocabulary, craftInvestment)", "status": "blocked", "dependsOn": ["3WS.2"], "milestone": "M3", "notes": "", "assignee": ""}, {"id": "3WS.4", "description": "`engine/world/culture.ts` — `generatePhases(culture, prng): CulturePhase[]` — 3-4 phases per culture with `PhaseCharacteristics` (technology, economy, society, aesthetics)", "status": "blocked", "dependsOn": ["3WS.3"], "milestone": "M3", "notes": "", "assignee": ""}, {"id": "3WS.5", "description": "`engine/world/culture.ts` — `generateRelat <script type="module">
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

const DATA = JSON.parse(document.getElementById("roadmap-data").textContent);
const esc = s => String(s ?? "").replace(/[&<>"']/g,
	c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

document.getElementById("meta").textContent =
	`generated ${DATA.generated} · source .claude/roadmaps.json`;

/* Validation banner (empty when clean) */
if (DATA.validation && DATA.validation.length) {
	document.getElementById("validation").innerHTML =
		`<div class="validation"><strong>${DATA.validation.length} validation ` +
		`discrepancy(ies)</strong> — the numbers below reflect the file as-is.` +
		`<ul>${DATA.validation.map(v => `<li>${esc(v)}</li>`).join("")}</ul></div>`;
}

/* Section 1 — Overview */
const st = DATA.stats;
document.getElementById("hero").innerHTML =
	`${st.byStatus.done}/${st.total} tasks<small>${st.donePct}% complete</small>`;

const health = m => {
	const s = m.byStatus;
	if (m.donePct === 100) return "done";
	if (s.todo > 0) return "todo";
	if (s.blocked > 0) return "blocked";
	if (s.paused > 0) return "paused";
	if (s.deferred > 0) return "deferred";
	return "done";
};
document.getElementById("milestone-cards").innerHTML = st.milestones.map(m => `
	<div class="card mini">
		<h3>${esc(m.id)}: ${esc(m.name)}</h3>
		<span class="count">${m.done}/${m.total} done · ${m.donePct}%</span>
		<div class="progress-bar"><div class="progress-fill"
			style="width:${m.donePct}%;background:var(--color-${health(m)})"></div></div>
	</div>`).join("");

/* Section 2 — Milestones. Groups lead with actionable work. */
const GROUPS = [
	["todo",        "○ To Do",        "todo"],
	["blocked",     "✗ Blocked",      "blocked"],
	["paused",      "⏸ Paused",       "paused"],
	["deferred",    "⤓ Deferred",     "deferred"],
	["done",        "✓ Done",         "done"],
	["out_of_scope","⊘ Out of Scope", "out-of-scope"],
];
const readyIds = new Set(DATA.ready.candidates.map(c => c.id));
const tasksByMilestone = {};
for (const t of DATA.tasks) (tasksByMilestone[t.milestone] ??= []).push(t);

document.getElementById("milestone-details").innerHTML = st.milestones.map((m, i) => {
	const tasks = tasksByMilestone[m.id] || [];
	const groups = GROUPS.map(([status, label, varName]) => {
		const members = tasks.filter(t => t.status === status);
		if (!members.length) return "";
		const items = members.map(t => {
			const dep = (t.dependsOn && t.dependsOn.length)
				? `<span class="depnote">depends on ${esc(t.dependsOn.join(", "))}</span>` : "";
			const who = t.assignee ? `<span class="pill">${esc(t.assignee)}</span>` : "";
			return `<li class="${status === "out_of_scope" ? "oos" : ""}"
				style="--g-colour:var(--color-${varName})">
				<span class="tid">${esc(t.id)}</span>${esc(t.description)} ${dep}${who}</li>`;
		}).join("");
		return `<div class="group" style="--g-colour:var(--color-${varName})">
			<h4 style="color:var(--color-${varName})">${label}</h4><ul>${items}</ul></div>`;
	}).join("");
	const open = tasks.some(t => readyIds.has(t.id)) || i === 0 ? " open" : "";
	return `<details class="milestone"${open}>
		<summary><span class="mid">${esc(m.id)}</span>${esc(m.name)}
			<span class="count">${m.done}/${m.total}</span></summary>
		<div class="body">${groups || "<p class='depnote'>No tasks.</p>"}</div>
	</details>`;
}).join("");

/* Section 3 — Dependency graph */
/* ELK lays out this dense a graph with far fewer crossings than the default
   dagre engine; if its module fails to load, dagre still renders. */
let layout = "dagre";
try {
	const elkLayouts = (await import("https://cdn.jsdelivr.net/npm/@mermaid-js/layout-elk@0/dist/mermaid-layout-elk.esm.min.mjs")).default;
	mermaid.registerLayoutLoaders(elkLayouts);
	layout = "elk";
} catch { /* CDN unreachable — fall back */ }
mermaid.initialize({
	startOnLoad: false,
	theme: "base",
	layout,
	themeVariables: {
		fontSize: "16px",
		fontFamily: '"IBM Plex Mono", monospace',
	},
});
/* Mermaid 11's classDef parser rejects var(--x), so the semantic variables
   are resolved to concrete colours before rendering, and the graph re-renders
   when the colour scheme flips so it keeps tracking the page theme. A render
   failure is contained to the diagram shell — the sections after it must
   still populate. */
const wrap = document.getElementById("wrap");
const shell = document.getElementById("shell");
const diagram = document.getElementById("diagram");
let svgEl = null;
let scale = 1, tx = 0, ty = 0;
const apply = () => { if (svgEl) svgEl.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; };
const renderGraph = async () => {
	const rootStyle = getComputedStyle(document.documentElement);
	const src = DATA.mermaid.replace(/var\((--[\w-]+)\)/g,
		(_, name) => rootStyle.getPropertyValue(name).trim() || "#888888");
	try {
		const { svg } = await mermaid.render("roadmap-graph", src);
		diagram.innerHTML = svg;
	} catch (err) {
		document.getElementById("droadmap-graph")?.remove();
		diagram.innerHTML = `<p class="depnote">Dependency graph failed to render: ${esc(String(err))}</p>`;
		return;
	}
	svgEl = wrap.querySelector("svg");
	svgEl.addEventListener("dblclick", () => shell.classList.toggle("expanded"));
	apply();
};
await renderGraph();
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", renderGraph);

/* Zoom/pan: buttons, ctrl+wheel, drag; expand toggles a fixed overlay */
const zoom = f => { scale = Math.min(4, Math.max(0.25, scale * f)); apply(); };
shell.querySelector(".diagram-toolbar").addEventListener("click", e => {
	const act = e.target.dataset.act;
	if (act === "in") zoom(1.25);
	else if (act === "out") zoom(0.8);
	else if (act === "reset") { scale = 1; tx = ty = 0; apply(); }
	else if (act === "expand") shell.classList.toggle("expanded");
});
wrap.addEventListener("wheel", e => {
	if (!e.ctrlKey && !e.metaKey) return;
	e.preventDefault();
	zoom(e.deltaY < 0 ? 1.1 : 0.9);
}, { passive: false });
let drag = null;
wrap.addEventListener("pointerdown", e => { drag = { x: e.clientX - tx, y: e.clientY - ty }; wrap.setPointerCapture(e.pointerId); });
wrap.addEventListener("pointermove", e => { if (drag) { tx = e.clientX - drag.x; ty = e.clientY - drag.y; apply(); } });
wrap.addEventListener("pointerup", () => { drag = null; });

/* Section 4 — Next Up (pre-vetted by roadmap.py ready) */
document.getElementById("ready").innerHTML = DATA.ready.candidates.length
	? DATA.ready.candidates.map(c => `
		<li style="--g-colour:var(--color-todo)">
			<span class="tid">${esc(c.id)}</span>${esc(c.description)}
			<span class="pill">${esc(c.milestone)}: ${esc(c.milestoneName)}</span>
			${c.assignee ? `<span class="pill">${esc(c.assignee)}</span>` : ""}
			<span class="signal">unblocks ${c.transitiveUnblocks}${c.isMilestoneSink ? " · completes milestone" : ""}</span>
		</li>`).join("")
	: "<li>No unblocked tasks — clear a blocker or a gate.</li>";

/* Nav highlight */
const links = [...document.querySelectorAll("nav a")];
const highlight = new IntersectionObserver(entries => {
	for (const en of entries) if (en.isIntersecting) {
		links.forEach(a => a.classList.toggle("active", a.hash === "#" + en.target.id));
	}
}, { rootMargin: "-30% 0px -60% 0px" });
links.forEach(a => highlight.observe(document.querySelector(a.hash)));
</script>
